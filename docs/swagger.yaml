openapi: 3.0.3
info:
  title: SmartCV API
  description: AI-powered CV tailoring application API
  version: 1.0.0
  contact:
    name: SmartCV Team
    email: support@smartcv.app

servers:
  - url: http://localhost:8080/api
    description: Development server
  - url: https://api.smartcv.app
    description: Production server

paths:
  /user:
    get:
      summary: Get current user
      tags: [User]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /user/profile:
    put:
      summary: Update user profile
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Profile'
      responses:
        '200':
          description: Profile updated

  /user/upload-cv:
    post:
      summary: Upload and parse CV file
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: CV parsed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object

  /jobs:
    get:
      summary: List all job applications
      tags: [Jobs]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of job applications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JobApplication'
    post:
      summary: Create a new job application
      tags: [Jobs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobApplicationInput'
      responses:
        '201':
          description: Job application created

  /jobs/{id}:
    get:
      summary: Get job application by ID
      tags: [Jobs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Job application details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplication'
    put:
      summary: Update job application
      tags: [Jobs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobApplicationInput'
      responses:
        '200':
          description: Job application updated
    delete:
      summary: Delete job application
      tags: [Jobs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Job application deleted

  /jobs/{id}/analyze:
    post:
      summary: Analyze gap between profile and job
      tags: [Jobs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Gap analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GapAnalysisResponse'

  /jobs/{id}/interview/start:
    post:
      summary: Start AI interview session
      tags: [Interview]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Interview session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  message:
                    type: string

  /jobs/{id}/interview/chat:
    post:
      summary: Send message in interview
      tags: [Interview]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                session_id:
                  type: string
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  message:
                    type: string

  /cvs:
    get:
      summary: List all generated CVs
      tags: [CVs]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of CVs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GeneratedCV'

  /cvs/generate:
    post:
      summary: Generate a new CV
      tags: [CVs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_application_id]
              properties:
                job_application_id:
                  type: integer
      responses:
        '201':
          description: CV generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedCV'
        '402':
          description: Insufficient credits

  /cvs/{id}:
    get:
      summary: Get CV by ID
      tags: [CVs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: CV details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedCV'
    delete:
      summary: Delete CV
      tags: [CVs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: CV deleted

  /cvs/{id}/pdf:
    get:
      summary: Download CV as PDF
      tags: [CVs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /cvs/{id}/comments:
    get:
      summary: Get CV comments
      tags: [CVs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CVComment'
    post:
      summary: Add comment to CV
      tags: [CVs]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                section:
                  type: string
      responses:
        '201':
          description: Comment added

  /cvs/{cvId}/comments/{commentId}/apply:
    post:
      summary: Apply comment suggestion
      tags: [CVs]
      security:
        - bearerAuth: []
      parameters:
        - name: cvId
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Comment applied

  /credits/packages:
    get:
      summary: Get available credit packages
      tags: [Credits]
      responses:
        '200':
          description: List of credit packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CreditPackage'

  /credits/purchase:
    post:
      summary: Purchase credits
      tags: [Credits]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [package_id]
              properties:
                package_id:
                  type: string
      responses:
        '200':
          description: Payment URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  redirect_url:
                    type: string
                  order_id:
                    type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        clerk_id:
          type: string
        email:
          type: string
        full_name:
          type: string
        credits:
          type: integer
        created_at:
          type: string
          format: date-time

    Profile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        full_name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        summary:
          type: string
        linkedin:
          type: string
        github:
          type: string
        website:
          type: string

    UserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/Profile'
        experiences:
          type: array
          items:
            $ref: '#/components/schemas/Experience'
        education:
          type: array
          items:
            $ref: '#/components/schemas/Education'
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'

    Experience:
      type: object
      properties:
        id:
          type: integer
        company:
          type: string
        position:
          type: string
        location:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_current:
          type: boolean
        description:
          type: string
        achievements:
          type: array
          items:
            type: string

    Education:
      type: object
      properties:
        id:
          type: integer
        institution:
          type: string
        degree:
          type: string
        field_of_study:
          type: string
        location:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        gpa:
          type: number

    Skill:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        proficiency:
          type: string

    JobApplication:
      type: object
      properties:
        id:
          type: integer
        job_title:
          type: string
        company:
          type: string
        job_type:
          type: string
        job_description:
          type: string
        qualifications:
          type: string
        gap_analysis:
          type: object
        created_at:
          type: string
          format: date-time

    JobApplicationInput:
      type: object
      required:
        - job_title
        - job_description
      properties:
        job_title:
          type: string
        company:
          type: string
        job_type:
          type: string
        job_description:
          type: string
        qualifications:
          type: string

    GeneratedCV:
      type: object
      properties:
        id:
          type: integer
        job_application_id:
          type: integer
        title:
          type: string
        content:
          type: object
        ats_score:
          type: integer
        version:
          type: integer
        created_at:
          type: string
          format: date-time

    CVComment:
      type: object
      properties:
        id:
          type: integer
        cv_id:
          type: integer
        section:
          type: string
        content:
          type: string
        is_resolved:
          type: boolean
        ai_response:
          type: string
        applied:
          type: boolean
        created_at:
          type: string
          format: date-time

    GapAnalysisResponse:
      type: object
      properties:
        match_score:
          type: integer
        matching_skills:
          type: array
          items:
            type: string
        missing_skills:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
        questions:
          type: array
          items:
            type: string

    CreditPackage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        credits:
          type: integer
        price:
          type: number
        description:
          type: string
